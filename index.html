<!DOCTYPE html>
<html>
<head>
  <title>NovaX</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>NovaX</h1>
  <p class="subtitle">Study smarter. Improve daily.</p>

  <!-- START -->
  <button class="primary" onclick="startStudy()">Start Session</button>

  <!-- QUIZ -->
  <div id="quiz" class="card hidden">
    <h2 id="question">d/dx (x²) = ?</h2>

    <button onclick="answer('A')">A) x</button>
    <button onclick="answer('B')">B) 2x</button>
    <button onclick="answer('C')">C) x²</button>
  </div>

  <!-- XP -->
  <div class="card">
    <h3>XP</h3>
    <div class="xp-bar">
      <div id="xp-bar-fill"></div>
    </div>
    <p><span id="xp">0</span> XP</p>
  </div>

  <!-- LEADERBOARD -->
  <div class="card">
    <h3>Leaderboard</h3>
    <div id="leaderboard"></div>
  </div>

</div>

<script src="./script.js"></script>
</body>
</html>
